<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible"
		content="IE=edge">
	<meta name="viewport"
		content="width=device-width, initial-scale=1.0">
	<title>
		Build a Survey Form using HTML and CSS
	</title>

	<style>

		/* Styling the Body element i.e. Color,
		Font, Alignment */
		body {
			
			font-family: Verdana;
			text-align: center;
		}

		/* Styling the Form (Color, Padding, Shadow) */
		form {
			background-color: #fff;
			max-width: 500px;
			margin: 50px auto;
			padding: 30px 20px;
			box-shadow: 2px 5px 10px rgba(0, 0, 0, 0.5);
		}

		/* Styling form-control Class */
		.form-control {
			text-align: left;
			margin-bottom: 25px;
		}

		/* Styling form-control Label */
		.form-control label {
			display: block;
			margin-bottom: 10px;
		}

		/* Styling form-control input,
		select, textarea */
		.form-control input,
		.form-control select,
		.form-control textarea {
			border: 1px solid #777;
			border-radius: 2px;
			font-family: inherit;
			padding: 10px;
			display: block;
			width: 95%;
		}

		/* Styling form-control Radio
		button and Checkbox */
		.form-control input[type="radio"],
		.form-control input[type="checkbox"] {
			display: inline-block;
			width: auto;
		}

		/* Styling Button */
		button {
			background-color: #05c46b;
			border: 1px solid #777;
			border-radius: 2px;
			font-family: inherit;
			font-size: 21px;
			display: block;
			width: 100%;
			margin-top: 50px;
			margin-bottom: 20px;
		}
	</style>
</head>

<body>
	<h1></h1>

	<!-- Create Form -->
	<form id="form">

		<!-- Details -->
		<div class="form-control">
			<label for="name" id="label-name">Nom :</label>
			<!-- Input Type Text -->
			<input type="text" id="name" placeholder="Enter de Nom" name="Nom" />
		</div>

		<div class="form-control">
			<label for="Prenom" id="label-Prenom"> Prenom :</label>
			<!-- Input Type Email-->
			<input type="text" id="Prenom" placeholder="Enter de Prenom" name="Email" />
		</div>

		<div class="form-control">
			<label for="email" id="label-email">Email :</label>
			<!-- Input Type Text -->
			<input type="email" id="email" placeholder="Entre de Email" />
		</div>
        <div class="form-control">
			<label for="tel" id="label-Tel"> Telephone :</label>
			<!-- Input Type Text -->
			<input type="text" id="tel" placeholder="Entrez de telephone" />
		</div>
        <div class="form-control">
			<label> Description des Besoins </label>
			<!-- Input Type Radio Button -->
			<label for="recommed-1">
                <input type="checkbox" id="recommed-1" name="Description"> Création des sites E-Commerce</input>
			</label>
			<label for="recommed-2">
				<input type="checkbox" id="recommed-2" name="Description"> Création des sites web vitrine </input>
			</label>
			<label for="recommed-3">
				<input type="checkbox" id="recommed-3" name="Description"> Graphique désign </input>
			</label>
            <label for="recommed-4">
				<input type="checkbox" id="recommed-4" name="Description"> Création des Application Mobile </input>
			</label>
            <label for="recommed-5">
				<input type="checkbox" id="recommed-5" name="Description"> Création des Applications Desktop </input>
			</label>
            <label for="recommed-6">
				<input type="checkbox" id="recommed-6" name="Description"> Référencement (SEO) </input>
			</label>
		</div>
        <div class="form-control">
			<label for="but" id="label-but"> Budget alloué DHS :</label>
			<!-- Input Type Text -->
			<input type="number" id="but" placeholder="Entrez le Budget" />
		</div>
        <div class="form-control">
			<label for="Delai" id="label-but"> Délai : </label>
			<!-- Input Type Text -->
			<input type="date" id="Delai" placeholder="Entrez le Délai" />
		</div>
		<div class="form-control">
			<label for="comment">
				Message :
			</label>

			<!-- multi-line text input control -->
			<textarea name="Message" id="Message" placeholder="Enter le Message">
			</textarea>
		</div>
		<!-- Multi-line Text Input Control -->
		<button type="submit" value="submit">
			Submit
		</button>
	</form>
</body>
</html>
